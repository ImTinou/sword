name: Build release

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into Lua script
        run: |
          sed -i 's|%%LOG_WEBHOOK%%|${{ secrets.LOG_WEBHOOK }}|g' sword/enchant_picker.lua

      - name: Push to release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sword/enchant_picker.lua
          git commit -m "Build: inject secrets [skip ci]"
          git push origin HEAD:release --force
